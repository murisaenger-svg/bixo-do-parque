<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

img{
    position:absolute;
    width:100px;
}
</style>
</head>
<body>

<script>
for(let i = 0; i < 500; i++){
    const img = document.createElement("img");

    img.src = "Captura de tela 2026-06-05 014345.png";

    img.style.left = Math.random() * window.innerWidth + "px";
    img.style.top = Math.random() * window.innerHeight + "px";
    img.style.transform =
        `rotate(${Math.random()*360}deg)`;

    document.body.appendChild(img);
}
</script>

</body>
</html>
